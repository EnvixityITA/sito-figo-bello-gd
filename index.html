<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App con Profilo Customizzabile</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f4f6f8;
      color: #333;
    }

    .app-container {
      display: flex;
      height: 100vh;
    }

    /* Barra laterale (Sidebar) */
    .sidebar {
      width: 70px;
      background-color: #1e1e24;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-right: 1px solid #ddd;
    }

    .nav-icons {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .icon-btn, .profile-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 10px;
      border-radius: 12px;
      transition: background 0.2s;
    }

    .icon-btn:hover, .profile-btn:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    /* Icona profilo circolare nella sidebar */
    #sidebar-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #4CAF50;
    }

    .main-content {
      flex: 1;
      padding: 40px;
    }

    /* Finestra Modale */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.hidden {
      display: none;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 16px;
      width: 350px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .avatar-container {
      margin: 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #modal-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #eee;
    }

    .upload-btn {
      background: #e0e0e0;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .upload-btn:hover {
      background: #d0d0d0;
    }

    .input-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
      color: #666;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn.primary {
      background: #4CAF50;
      color: white;
    }

    .btn.secondary {
      background: #f1f1f1;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Barra laterale a sinistra -->
    <nav class="sidebar">
      <div class="nav-icons">
        <button class="icon-btn" title="Home">🏠</button>
        <button class="icon-btn" title="Messaggi">💬</button>
        <button class="icon-btn" title="Impostazioni">⚙️</button>
      </div>
      
      <!-- Tasto Profilo in fondo alla barra -->
      <div class="profile-section">
        <button id="profile-icon-btn" class="profile-btn" title="Il tuo profilo">
          <img id="sidebar-avatar" src="https://via.placeholder.com/40" alt="Profilo">
        </button>
      </div>
    </nav>

    <!-- Contenuto principale dell'applicazione -->
    <main class="main-content">
      <h1>Benvenuto, <span id="display-name">Utente</span>! 👋</h1>
      <p>Clicca sull'icona del profilo in basso a sinistra nella barra laterale per personalizzare la tua foto e il tuo nome.</p>
    </main>
  </div>

  <!-- Finestra Modale per modificare il Profilo -->
  <div id="profile-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Modifica Profilo</h2>
      
      <!-- Gestione Immagine -->
      <div class="avatar-container">
        <img id="modal-avatar" src="https://via.placeholder.com/100" alt="Foto Profilo">
        <label for="avatar-upload" class="upload-btn">📷 Cambia foto</label>
        <input type="file" id="avatar-upload" accept="image/*" hidden>
      </div>

      <!-- Gestione Nome -->
      <div class="input-group">
        <label for="username-input">Il tuo Nome:</label>
        <input type="text" id="username-input" placeholder="Scrivi il tuo nome...">
      </div>

      <div class="modal-actions">
        <button id="save-btn" class="btn primary">Salva</button>
        <button id="close-btn" class="btn secondary">Chiudi</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const profileIconBtn = document.getElementById("profile-icon-btn");
      const profileModal = document.getElementById("profile-modal");
      const closeBtn = document.getElementById("close-btn");
      const saveBtn = document.getElementById("save-btn");
      
      const sidebarAvatar = document.getElementById("sidebar-avatar");
      const modalAvatar = document.getElementById("modal-avatar");
      const avatarUpload = document.getElementById("avatar-upload");
      const usernameInput = document.getElementById("username-input");
      const displayName = document.getElementById("display-name");

      // 1. Carica i dati salvati al riavvio della pagina
      loadProfileData();

      // 2. Apri e chiudi la modale
      profileIconBtn.addEventListener("click", () => {
        profileModal.classList.remove("hidden");
      });

      closeBtn.addEventListener("click", () => {
        profileModal.classList.add("hidden");
      });

      // 3. Gestione del caricamento di una nuova immagine
      let tempImageBase64 = null;

      avatarUpload.addEventListener("change", (event) => {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(e) {
            tempImageBase64 = e.target.result;
            modalAvatar.src = tempImageBase64; // Mostra l'anteprima nella modale
          };
          reader.readAsDataURL(file);
        }
      });

      // 4. Salva nome e foto nel localStorage
      saveBtn.addEventListener("click", () => {
        const newName = usernameInput.value.trim();
        
        if (newName) {
          localStorage.setItem("user_name", newName);
          displayName.textContent = newName;
        }

        if (tempImageBase64) {
          localStorage.setItem("user_avatar", tempImageBase64);
          sidebarAvatar.src = tempImageBase64;
        }

        profileModal.classList.add("hidden");
      });

      // Funzione per recuperare i dati dal browser
      function loadProfileData() {
        const savedName = localStorage.getItem("user_name");
        const savedAvatar = localStorage.getItem("user_avatar");

        if (savedName) {
          usernameInput.value = savedName;
          displayName.textContent = savedName;
        }

        if (savedAvatar) {
          sidebarAvatar.src = savedAvatar;
          modalAvatar.src = savedAvatar;
        }
      }
    });
  </script>
</body>
</html>
